services:
  - type: web
    name: choose-your-own-adventure-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.18
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        value: sqlite:///./database.db
      - key: ALLOWED_ORIGINS
        value: ""
      - key: OPENAI_API_KEY
        sync: false
